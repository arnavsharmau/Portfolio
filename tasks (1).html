<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poof</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2d;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.1);
    --text: #f0f0f0;
    --muted: #666;
    --done-color: #3a3a3d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }

  #stats {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  #stats b { color: var(--accent); font-weight: 500; }

  .input-row {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color .2s;
  }

  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--muted); }

  .priority-sel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }

  .priority-sel:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.96); }

  .filters {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all .15s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  #task-list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    animation: slideIn .2s ease;
    transition: border-color .2s, opacity .2s;
    position: relative;
    overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 10px 0 0 10px;
  }

  .task-item[data-priority="high"]::before { background: #ff4d4d; }
  .task-item[data-priority="med"]::before  { background: #ffaa00; }
  .task-item[data-priority="low"]::before  { background: #4daaff; }

  .task-item.done { opacity: 0.45; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .check-box {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    transition: all .15s;
  }

  .check-box:hover { border-color: var(--accent); }
  .task-item.done .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-box svg { display: none; }
  .task-item.done .check-box svg { display: block; }

  .task-text {
    flex: 1;
    font-size: 0.85rem;
    line-height: 1.4;
    word-break: break-word;
  }

  .p-badge {
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    flex-shrink: 0;
  }

  [data-priority="high"] .p-badge { background: rgba(255,77,77,.15); color: #ff4d4d; }
  [data-priority="med"]  .p-badge { background: rgba(255,170,0,.15); color: #ffaa00; }
  [data-priority="low"]  .p-badge { background: rgba(77,170,255,.15); color: #4daaff; }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s, background .15s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: #ff4d4d; background: rgba(255,77,77,.1); }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 40px;
    line-height: 2;
  }

  .clear-done {
    width: 100%;
    max-width: 560px;
    margin-top: 16px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 9px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all .15s;
    display: none;
  }

  .clear-done:hover { border-color: #ff4d4d; color: #ff4d4d; }
</style>
</head>
<body>

<header>
  <h1>Poo<span>f</span></h1>
  <div id="stats"></div>
</header>

<div class="input-row">
  <input type="text" id="task-input" placeholder="new task..." maxlength="120" />
  <select class="priority-sel" id="priority-sel">
    <option value="high">🔴 high</option>
    <option value="med" selected>🟡 med</option>
    <option value="low">🔵 low</option>
  </select>
  <button class="add-btn" onclick="addTask()">+ Add</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">all</button>
  <button class="filter-btn" data-filter="active" onclick="setFilter('active',this)">active</button>
  <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">done</button>
  <button class="filter-btn" data-filter="high" onclick="setFilter('high',this)">🔴 high</button>
  <button class="filter-btn" data-filter="med" onclick="setFilter('med',this)">🟡 med</button>
  <button class="filter-btn" data-filter="low" onclick="setFilter('low',this)">🔵 low</button>
</div>

<div id="task-list"></div>
<button class="clear-done" id="clear-done-btn" onclick="clearDone()">✕ clear completed tasks</button>

<script>
  let tasks = JSON.parse(localStorage.getItem('poof_tasks') || '[]');
  let currentFilter = 'all';

  function save() {
    localStorage.setItem('poof_tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    const priority = document.getElementById('priority-sel').value;
    tasks.unshift({ id: Date.now(), text, priority, done: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    if (currentFilter === 'all')    return tasks;
    if (currentFilter === 'active') return tasks.filter(t => !t.done);
    if (currentFilter === 'done')   return tasks.filter(t => t.done);
    return tasks.filter(t => t.priority === currentFilter);
  }

  function render() {
    const list = document.getElementById('task-list');
    const filtered = getFiltered();
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;

    // stats
    document.getElementById('stats').innerHTML =
      `<b>${done}</b> / ${total} done<br><span>${total - done} remaining</span>`;

    // clear done button
    const clearBtn = document.getElementById('clear-done-btn');
    clearBtn.style.display = done > 0 ? 'block' : 'none';

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-msg">nothing here.<br>add a task and make it go poof</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" data-priority="${t.priority}">
        <div class="check-box" onclick="toggleTask(${t.id})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="#0e0e0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="task-text">${escHtml(t.text)}</span>
        <span class="p-badge">${t.priority}</span>
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
